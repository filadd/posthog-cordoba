<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PostHog Cordoba - Event 0</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      padding: 2rem;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
    }
    header {
      margin-bottom: 2rem;
    }
    header a {
      color: #999;
      text-decoration: none;
      font-size: 0.9rem;
    }
    header a:hover { color: #f54e00; }
    h1 {
      font-size: 2rem;
      margin-top: 0.5rem;
      color: #f9f9f9;
    }
    h1 span { color: #f54e00; }
    p.subtitle {
      color: #666;
      margin-top: 0.25rem;
    }
    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    a.project-link {
      display: block;
      padding: 1rem 1.5rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 1rem;
      transition: border-color 0.2s, background 0.2s;
    }
    a.project-link:hover {
      border-color: #f54e00;
      background: #222;
    }
    .empty {
      color: #555;
      font-style: italic;
      padding: 2rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="/">&larr; PostHog Cordoba</a>
      <h1>Event <span>0</span></h1>
      <p class="subtitle">Projects from the first PostHog Cordoba meetup</p>
    </header>

    <!--
      To add a new project:
      1. Create a subfolder: event-0/your-project/index.html
      2. Add a link below:
         <li><a class="project-link" href="./your-project/">Your Project Name</a></li>
    -->
    <ul>
      <li><a class="project-link" href="./munchkin-dungeon/">Munchkin Dungeon</a></li>
    </ul>
  </div>
</body>
</html>
