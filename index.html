<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PostHog Cordoba</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      color: #f9f9f9;
    }
    h1 span { color: #f54e00; }
    p {
      color: #999;
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }
    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    a {
      display: block;
      padding: 1rem 2rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 1.1rem;
      transition: border-color 0.2s, background 0.2s;
    }
    a:hover {
      border-color: #f54e00;
      background: #222;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>PostHog <span>Cordoba</span></h1>
    <p>Community events & projects</p>

    <!-- Add new events here -->
    <ul>
      <li><a href="/event-0/">Event 0</a></li>
    </ul>
  </div>
</body>
</html>
